<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cerebro | Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="chat-layout">
        <!-- Sidebar -->
        <div class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-brain"></i>
                    <span>Cerebro</span>
                </div>
                <button class="close-sidebar" id="closeSidebarBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="sidebar-actions">
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
            
            <div class="conversations-section">
                <h4>Today</h4>
                <div class="conversation-list" id="todayList"></div>
                
                <h4>Yesterday</h4>
                <div class="conversation-list" id="yesterdayList"></div>
                
                <h4>Last 7 Days</h4>
                <div class="conversation-list" id="weekList"></div>
                
                <h4>Last 30 Days</h4>
                <div class="conversation-list" id="monthList"></div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Loading...</span>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
                <button class="delete-account-btn" id="deleteAccountBtn">
                    <i class="fas fa-trash-alt"></i> Delete Account
                </button>
            </div>
        </div>
        
        <!-- Main Chat Area -->
        <div class="chat-main">
            <div class="chat-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="chat-title" id="chatTitle">New Conversation</div>
                <!-- PDF Mode Badge — only visible when a PDF is loaded -->
                <div id="pdfModeBadge" class="pdf-mode-badge" style="display: none;">
                    <i class="fas fa-file-pdf"></i> PDF Mode
                </div>
            </div>
            
            <!-- Study Mode Bar (Shows when PDF is loaded) -->
            <div id="studyModeBar" class="study-mode-bar" style="display: none;">
                <div class="study-mode-info">
                    <i class="fas fa-file-pdf"></i>
                    <span>📄 PDF Loaded:</span>
                    <span id="pdfFileName"></span>
                    <span id="pdfCounter" class="pdf-counter"></span>
                </div>
                <button class="exit-study-mode" id="exitStudyModeBtn">
                    <i class="fas fa-times"></i> Exit PDF Mode
                </button>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <i class="fas fa-brain"></i>
                    <h2>Welcome to Cerebro</h2>
                    <p>I'm your AI study assistant. Upload a PDF to get started!</p>
                </div>
            </div>
            
            <div class="chat-input-area">
                <div class="input-actions">
                    <button class="upload-btn" id="uploadBtn">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <div class="upload-options" id="uploadOptions">
                        <button class="upload-option" id="uploadPdfOption">
                            <i class="fas fa-file-pdf"></i> Upload PDF
                        </button>
                    </div>
                </div>
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Ask me anything..." autocomplete="off">
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <input type="file" id="fileInput" accept=".pdf" multiple style="display: none;">
            </div>
        </div>
    </div>
    
    <!-- Edit Conversation Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Edit Conversation Title</h3>
            <input type="text" id="editTitleInput" placeholder="Enter new title">
            <div class="modal-buttons">
                <button id="saveEditBtn">Save</button>
                <button id="cancelEditBtn">Cancel</button>
            </div>
        </div>
    </div>
    
    <script src="js/chat.js"></script>
</body>
</html>

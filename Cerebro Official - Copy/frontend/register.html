<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cerebro | Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Back Button -->
    <a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i> Back
    </a>
    
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card" style="max-width: 450px;">
                <div class="auth-header">
                    <i class="fas fa-brain"></i>
                    <h1>Create Account</h1>
                    <p>Join Cerebro today</p>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <form id="registerForm">
                    <div class="row">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="firstName" placeholder="First Name" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-user-tag"></i>
                            <input type="text" id="lastName" placeholder="Last Name (Username)" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="password"></i>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="confirmPassword"></i>
                    </div>
                    
                    <button type="submit" class="btn-auth">Create Account</button>
                </form>
                
                <div class="auth-footer">
                    Already have an account? <a href="login.html">Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
